<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>循环星球</title>
    <script>window.onerror = function(m){alert("脚本报错: " + m);}</script>
    <style>
        :root {
            --bg: #050510;
            --cyan: #00ffff;
            --pink: #ff0080;
            --purple: #bf00ff;
            --text: rgba(255,255,255,.88);
            --dim: rgba(255,255,255,.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Text', 'SF Pro Icons', 'AOS Icons', 'Helvetica Neue', Helvetica, Arial, sans-serif, system-ui;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 0;
            background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(255,0,128,0.1));
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,255,255,0.1);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--cyan), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0,255,255,0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--dim);
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 0, 128, 0.3);
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 0, 128, 0.4);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(255, 0, 128, 0.3);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 255, 255, 0.1);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 255, 255, 0.2);
            border-color: var(--cyan);
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--cyan);
        }

        .feature-card p {
            color: var(--dim);
            margin-bottom: 1.5rem;
        }

        .preview-container {
            margin: 3rem 0;
            text-align: center;
        }

        #preview-canvas {
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.3);
            max-width: 100%;
            height: auto;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: 1px solid rgba(0, 255, 255, 0.1);
            color: var(--dim);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>循环星球</h1>
            <p class="subtitle">沉浸式手势控制星球探索体验</p>
            <button class="btn" onclick="window.location.href = './gesture/index.html'">开始探索</button>
        </header>

        <section class="features">
            <div class="feature-card">
                <h3>手势控制</h3>
                <p>使用手掌旋转控制视角，握拳拉远，张开靠近，获得身临其境的星球探索体验。</p>
            </div>
            <div class="feature-card">
                <h3>粒子效果</h3>
                <p>精心设计的粒子系统，模拟星球表面和光环效果，带来视觉盛宴。</p>
            </div>
            <div class="feature-card">
                <h3>实时反馈</h3>
                <p>摄像头实时捕捉手部动作，提供即时反馈，让交互更加自然流畅。</p>
            </div>
        </section>

        <section class="preview-container">
            <h2>效果预览</h2>
            <canvas id="preview-canvas" width="800" height="400"></canvas>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 循环星球 - 探索无限可能</p>
    </footer>

    <script>
        // 预览画布效果
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');

        // 粒子系统
        const particles = [];
        const particleCount = 200;

        // 初始化粒子
        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                size: Math.random() * 3 + 1,
                color: Math.random() > 0.5 ? '#00ffff' : '#ff0080'
            });
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            const gradient = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.width);
            gradient.addColorStop(0, '#050510');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制粒子
            particles.forEach(particle => {
                // 更新位置
                particle.x += particle.vx;
                particle.y += particle.vy;

                // 边界检测
                if (particle.x < 0 || particle.x > canvas.width) particle.vx *= -1;
                if (particle.y < 0 || particle.y > canvas.height) particle.vy *= -1;

                // 绘制粒子
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = particle.color;
                ctx.fill();

                // 绘制连接线
                particles.forEach(otherParticle => {
                    const distance = Math.sqrt(
                        Math.pow(particle.x - otherParticle.x, 2) + Math.pow(particle.y - otherParticle.y, 2)
                    );
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `${particle.color}33`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particle.x, particle.y);
                        ctx.lineTo(otherParticle.x, otherParticle.y);
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();
    </script>
</body>
</html>
